<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkHub India | Pranav Gawali</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Poppins', sans-serif; margin: 0; background: #0f172a; color: #f8fafc; text-align: center; scroll-behavior: smooth; }
  .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 40px; margin: 30px auto; max-width: 600px; }
  .hero { padding: 100px 20px; }
  .btn-primary { background: #38bdf8; color: #0f172a; padding: 16px 40px; border-radius: 50px; text-decoration: none; font-weight: 700; display: inline-block; }
  .form-container input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; background: rgba(255, 255, 255, 0.1); color: white; box-sizing: border-box; }
  .founder-photo { width: 180px; height: 180px; border-radius: 50%; border: 4px solid #38bdf8; object-fit: cover; }
  .floating-buttons { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 10px; }
  .btn-float { width: 60px; height: 60px; border-radius: 50%; border: none; cursor: pointer; font-size: 24px; }
</style>
</head>
<body>

  <!-- HERO SECTION -->
  <section class="hero">
    <h1>WorkHub India</h1>
    <p>Learn • Grow • Earn</p>
    <h2 style="font-size: 2.5rem; margin: 20px 0;">Start Your Work From Home Journey</h2>
    <a href="#apply-form" class="btn-primary">Apply Now ➔</a>
  </section>

  <!-- FORM SECTION -->
  <section id="apply-form" style="padding: 50px 20px;">
    <div class="glass-card">
      <h2 style="margin-top:0;">Apply For The Opportunity</h2>
      <input type="text" id="userName" placeholder="Full Name">
      <input type="number" id="userAge" placeholder="Age (18+ Only)">
      <input type="text" id="userCity" placeholder="City">
      <input type="text" id="userEdu" placeholder="Profession">
      <button onclick="sendToWhatsapp()" class="btn-primary" style="border:none; cursor:pointer; width:100%; margin-top:10px;">Submit ➔</button>
    </div>
  </section>

  <!-- FOUNDER SECTION -->
  <section style="padding: 50px 20px;">
    <div class="glass-card">
      <img src="founder.jpg" alt="Founder" class="founder-photo">
      <h3>Pranav Rohidas Gawali</h3>
      <p style="opacity: 0.8;">Founder | WorkHub India</p>
    </div>
  </section>

  <div class="floating-buttons">
    <button onclick="window.open('https://wa.me/917666601285')" class="btn-float" style="background:#25D366;">💬</button>
    <button onclick="window.open('https://wa.me/917666601285?text=Hello%20Pranav%20Sir,%20I%20need%20help%20from%20RISEBOT!')" class="btn-float" style="background:#38bdf8;">🤖</button>
  </div>

  <script>
    function sendToWhatsapp() {
      let n = document.getElementById("userName").value;
      let a = document.getElementById("userAge").value;
      let c = document.getElementById("userCity").value;
      let e = document.getElementById("userEdu").value;
      window.open(`https://wa.me/917666601285?text=Name:${n}, Age:${a}, City:${c}, Profession:${e}`, "_blank");
    }
  </script>
</body>
</html>
